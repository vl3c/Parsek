# Dimension registry (M-A5). Committed materialization of the scenario-catalog
# section 1 (docs/dev/automated-testing-scenario-catalog.md) dimension space
# D1-D18. AUTHORITATIVE machine source of the dimension value set: spec
# validation (hlib.validate_spec) and the coverage denominator (hlib.compute_coverage)
# both read THIS file, nothing else. The catalog markdown stays a narrative
# companion kept in sync by a human in the same PR that adds a value (design N9).
#
# One table per dimension; each `values` list is token-per-value, kebab-case.
# A spec citing a (dimension, value) absent here fails validation, and an
# uncovered value here surfaces as the visible backlog in the coverage report.
#
# Growth rule (plan section 4 item 5): a new Parsek feature adds its dimension
# values here in the SAME PR, so the coverage report immediately shows the gap.
# Plain ASCII.

