schema = 1
id = "EVA-1-pad-flag"
# NIGHTLY (design M-C2 EVA-1): flight-free, daily-tier cost class once the operator run
# (P1 load-and-focus sanity, P3 count-window pin, P6 flag-capture proof) promotes it to
# daily. Nightly until then. IMPLEMENTED PENDING IN-GAME PROOF: the verbs + deciders are
# unit-covered, but the first live run pins the recordings-count window (R-C) and confirms
# the required log tokens; the exact "[Pipeline-Smoothing]" structural-snapshot message is
# regex-escaped here (the design deferred exact-message pinning to implementation).
#
# BATCH-AUTORUN EVALUATION (EVA lane task, decision: DO NOT WIRE). The EVA lane
# asked whether to attach PARSEK_AUTORUN_TESTS (or a RunTests step) with the
# EVA-relevant in-game categories (AutoRecord / EvaSpawnPosition / CrewReservation
# / CrewReservationLive) so those live tests run on every EVA nightly. Verdict:
# NOT wired here (batchComplete stays SKIPPED), for the following evidence-based
# reasons:
#   1. The valuable AutoRecord EVA tests (WaitForActiveEvaBranchRecording,
#      EvaKerbalGhostHasVesselSnapshot, CountEvaBranches, ...) are ALL declared
#      AllowBatchExecution=false in RuntimeTests.cs -- they run ONLY in Isolated /
#      row-play mode, which the harness RunTests seam never invokes. A
#      `RunTests category=AutoRecord` batch would execute ZERO of them. They also
#      require a MID-FLIGHT crewed vessel and Skip on PRELAUNCH/LANDED/SPLASHED;
#      this fixture is a PRELAUNCH pod, so even isolated they would Skip.
#   2. The batch-safe categories (EvaSpawnPosition, CrewReservationLive) read over
#      RecordingStore.CommittedRecordings and Skip when there are no committed
#      spawned-endpoint recordings -- a fresh PRELAUNCH EVA fixture has none, so
#      they would Skip, not exercise. They gain nothing from the EVA fixture.
#   3. This is a seam-DRIVEN scenario that PRODUCES and commits a specific EVA
#      recording the verifier chain checks (recordings count 2-4, analyzer
#      fresh-gate, logContracts). A batch runs the test-runner campaign-isolation
#      contract (FLIGHT-with-vessel = in-memory+disk revert of persistent.sfs from
#      a .bak captured at batch start; RestoreBatchFlightBaselineAfterExecution).
#      Inserting a batch anywhere in the EVA step sequence would couple this
#      scenario's recording-production verification to that revert timing (baseline
#      captured before the commit wipes the recording on revert; after the commit
#      makes the count/analyzer expectations depend on the in-memory+disk snapshot
#      fidelity) -- fragile, and any isolation-contract change would silently break
#      EVA verification. Live-EVA batch tests also collide with the seam-driven
#      EvaExit sequence (stock ground truth 5: a kerbal on the hatch blocks the
#      next exit).
# If a nightly home for the batch-safe EVA-adjacent categories is wanted, the
# clean path is a DEDICATED batch-only scenario over the injected corpus (the
# S1.4 / H6 pattern: LoadGame an injected save -> RunTests the category ->
# BATCH_COMPLETE), where committed spawned-endpoint recordings actually exercise
# EvaSpawnPosition / CrewReservationLive instead of Skipping. That is future work,
# tracked in docs/dev/todo-and-known-bugs.md, not this scenario. The same verdict
# applies to EVA-2 and EVA-3 (batchComplete SKIPPED).
tier = "nightly"
description = "Ground EVA on the pad: exit + ladder release + flag plant + re-board (single kerbal); the foreground EVA branch, structural snapshot, FlagEvent capture, and board merge all record."
instanceProfile = "stock-minimal"
tags = ["eva", "flag-plant", "eva-branch", "D2", "D5", "D7", "B3", "S0.2"]

[fixture]
# gloops-airshow SANDBOX pod (committed; the same fixture S0.5/S0.6 use). The active vessel
# is a single mk1pod.v2 crewed with Jebediah Kerman, PRELAUNCH on the LaunchPad (P1 confirms
# the crewing). No new fixture needed (F11).
saveTemplate = "fixtures/saves/gloops-airshow"
injectedRecordings = "none"
craft = []

[driver]
kind = "seam"
# Recorder live on the pod -> EvaExit triggers the FOREGROUND EVA branch (structural snapshot
# at the EVA UT, recorder stop, deferred tree branch, recording follows the kerbal, pod parks
# in BackgroundMap) -> ladder release drops the kerbal to the pad -> PlantFlag (FlagEvent
# captured into the foreground recorder, now the kerbal's) -> EvaBoard (board merge chains back
# to the pod with a Board branch point) -> stop, commit. Arg values are RAW; run.py encode_value
# does the wire percent-encoding (F3).
steps = [
  { cmd = "LoadGame",     args = { save = "${runSave}", name = "persistent" }, expect = "OK", budget = 300 },
  { cmd = "SetSetting",   args = { name = "autoRecordOnLaunch", value = "false" }, expect = "OK" },
  { cmd = "SetSetting",   args = { name = "verboseLogging", value = "true" }, expect = "OK" },
  { cmd = "StartRecording",                                             expect = "OK" },
  { cmd = "MissionMark",  args = { label = "eva1 exit" },               expect = "OK" },
  { cmd = "EvaExit",      args = { release = "true" },                  expect = "OK", budget = 120 },
  { cmd = "PlantFlag",                                                  expect = "OK", budget = 180 },
  { cmd = "EvaBoard",                                                   expect = "OK", budget = 120 },
  { cmd = "StopRecording",                                              expect = "OK" },
  { cmd = "CommitTree",                                                 expect = "OK" },
  { cmd = "FlushAndQuit",                                               expect = "OK" },
]

[dimensionsCovered]
D2  = ["structural-event-snapshots"]    # EVA-UT snapshot on the pod recording (asserted by [Pipeline-Smoothing])
D5  = ["eva-branch"]
D7  = ["flag-plant"]
D14 = ["kerbin", "sandbox", "scene-flight"]

[expectations.recordings]
# Pod + EVA branch recordings are certain (min 2); whether the board merge adds a chain-segment
# recording and whether the stationary pod survives the sub-2-point drop are pinned by the first
# live run (P3, R-C: window over guess).
count = { min = 2, max = 4 }

[expectations.logContracts]
# "Mid-recording EVA detected" / "Tree board merge completed" / "[Pipeline-Smoothing]" are
# VERBOSE (ParsekFlight.Log / the FlightRecorder structural-snapshot lines) - they require the
# verboseLogging=true pin above (F8). The [Pipeline-Smoothing] token (regex-escaped to match the
# subsystem-tag bracket) is what makes the D2 structural-event-snapshots claim ASSERTED rather
# than nominal. "Tree branch created: type=EVA", "detected boarding from EVA", and "Flag event
# captured" are Info and do not depend on the pin.
required  = ["Recording started", "Mid-recording EVA detected",
             "Tree branch created: type=EVA", "\\[Pipeline-Smoothing\\]",
             "Flag event captured", "detected boarding from EVA",
             "Tree board merge completed", "committree committed=true"]
forbidden = ["\\[Parsek\\]\\[ERROR\\]"]

allowedAnomalies = []

[runtime]
# Budget arithmetic (S0.6 pattern): 840 >= 300 LoadGame + 120 EvaExit + 180 PlantFlag +
# 120 EvaBoard + fast verbs (SetSetting/Start/Stop/Commit/MissionMark/FlushAndQuit, seconds
# each) + 60 margin. LoadGame is the only DEFERRED_SEAM_VERB step; the EVA verbs ride their
# per-verb dispatch budgets (120/180/120), each under the 540 cap.
budgetSeconds = 840

[retry]
policy = "once"

[expectedFail]
bugId = ""
