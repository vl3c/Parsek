schema = 1
id = "B1-pad-hop"
# nightly: the fixtures/saves/b1-pad-craft template is committed (operator
# 2026-07-19) and the mission is live-proven flyable (2026-07-19/20 runs, all
# phases reached); flown missions are too long for daily.
#
# ===================================================================================
# RE-PROOF PENDING (2026-07-25). The 2026-07-19/20 runs proved the FLIGHT, not the
# CHUTE. Their recordings carry ZERO Parachute* part events: the craft fell from
# ~12 km to the ground at terminal velocity and broke up, and the DOWN terminal --
# which gated only on the machine's own COMMANDED chute latch -- awarded that impact
# the "chute-deployed impact" success end. See the [driver.missionParams] block for
# the decompiled root cause and the two flights of evidence.
#
# This spec now arms at the apoapsis crossing (the technique EVA-4 flight 2
# LIVE-PROVED on this exact fixture and craft) and gates BOTH the DOWN terminal and
# the new craftCanopyObserved assertion on the OBSERVED kRPC ParachuteState. Every
# decision is unit-covered, but three things can only be pinned by the first live run
# on this build and are called out inline: (P1) the final full-canopy leg to the
# ground, the one segment EVA-4 never times because it always hands off in mid-air
# (every other part of the descent is now measured, so the budget is derived rather
# than guessed), (P2) whether the stack survives touchdown (LANDED) or still breaks up
# under canopy (DOWN) -- both are accepted ends, (P3) the recordings count on the
# chuted profile.
# ===================================================================================
tier = "nightly"
description = "Pad hop: pre-placed craft, throttle+stage, coast, arm the chute at apoapsis, land under an observed canopy; assert apoapsis window + landed + canopy observed."
instanceProfile = "stock-minimal"
tags = ["B1", "S0.1", "flown"]

[fixture]
# The pre-placed vessel rides IN the fixture save (no VAB flow in v1). LoadGame
# drops straight into FLIGHT with this vessel on the pad. Fixture committed
# (operator 2026-07-19). The vessel is KSP's own stock "Jumping Flea"
# (Ships/VAB/Jumping Flea.craft: mk1pod.v2 + parachuteSingle + RT-5 Flea
# solidBooster.sm.v2 + fins). Its full-throttle hop fits the apoapsis window
# below.
#
# The parachuteSingle persists automateSafeDeploy = 0, deployAltitude = 1000 and
# minAirPressureToOpen = 0.04 (fixture persistent.sfs). automateSafeDeploy = 0 is
# the whole reason the mission must arm at the apex; it is left AS THE STOCK
# DEFAULT deliberately, because a scenario that edits its fixture to dodge a stock
# rule stops testing the stock rule.
#
# CORRECTION (2026-07-25): this note used to claim "the stack ALWAYS breaks apart at
# touchdown (~9 m/s vs the booster's 7 m/s tolerance)". That rate was never measured.
# The chute never opened on any run that produced it, so every observed breakup was a
# ~300 m/s terminal-velocity impact, not a canopy touchdown. Whether the stack
# survives a real canopy landing is P2, open until the first live run on this build.
# Both ends are accepted: LANDED if it survives, DOWN (operator decision 2026-07-20,
# option A) if it breaks apart under an OBSERVED canopy.
saveTemplate       = "fixtures/saves/b1-pad-craft"
injectedRecordings = "none"
craft              = []

[driver]
kind    = "autopilot"
mission = "b1_pad_hop"

# `steps` MUST stay in the [driver] table, so it is declared ABOVE the
# [driver.missionParams] header (a key after the sub-table header would be scoped
# to driver.missionParams.steps and the spec would validate as having zero steps).
# Budget arithmetic (design invariant): missionBudget 780 >= 30 connect +
# (90+180+360) phases + margin; runtime 1200 >= 240 LoadGame + 780 mission + margin.
# RAISED 2026-07-25 with the descent budget: the craft now flies its descent under
# canopy. The raise is modest because EVA-4 flight 2 measured the semi-deployed rate
# at up to -236 m/s - a chuted descent on this craft is not much longer than the
# unchuted one. See descentTimeoutSeconds for the full derivation.
steps = [
  { cmd = "LoadGame",   args = { save = "${runSave}", name = "persistent" }, expect = "OK", budget = 240 },
  { cmd = "SetSetting", args = { name = "autoRecordOnLaunch", value = "true" }, expect = "OK" },
  # verboseLogging: the "Part event: ..." lines the chute logContracts below require
  # are emitted at Verbose (FlightRecorder.cs:1687).
  { cmd = "SetSetting", args = { name = "verboseLogging",     value = "true" }, expect = "OK" },
  { phase = "mission",  expect = "MISSION-OK", budget = 780 },
  { cmd = "CommitTree",                                          expect = "OK" },
  { cmd = "FlushAndQuit",                                        expect = "OK" },
]

# Mission parameters are TOLERANCES / WINDOWS, never golden trajectories
# (plan section 10); validated against b1_pad_hop.schema.toml.
#
# ===================================================================================
# CHUTE PARAMS: ARM WHILE SLOW (2026-07-25). Root cause of the silent failure these
# replace, from the decompiled stock ModuleParachute plus two flights of evidence:
#
#   ACTIVE -> SEMIDEPLOYED requires ALL of: static pressure > minAirPressureToOpen
#   (0.04 atm) or below deployAltitude; |v| > 1 m/s; and
#   `automateSafeDeploy >= (int)deploymentSafeState`. DeploySafe reads SAFE only
#   while `shockTemp <= chuteMaxTemp * safeMult`, i.e. only while the craft is not
#   ramming hot air. The fixture persists automateSafeDeploy = 0 (SAFE only), so a
#   chute armed at terminal velocity in dense air waits for a SAFE reading that a
#   craft at terminal velocity can never produce on its own -- it just sits in ARMED.
#
#   EVIDENCE 1 (B1's own 2026-07-20 run, logs/2026-07-20_1829_B1-pad-hop): the
#   recording has exactly ONE parachuteSingle part event, a Decoupled at the ut of
#   the ground impact. No ParachuteSemiDeployed, no ParachuteDeployed, anywhere.
#   EVIDENCE 2 (EVA-4 flight 1, logs/2026-07-24_2210_EVA-4-atmo-chute): same craft,
#   same 2500 m altitude trigger, per-frame telemetry -- armed at 2,382 m / -301 m/s,
#   and 5.1 s later at 855 m the rate had moved 4.7 m/s.
#
# The fix is the one EVA-4 flight 2 LIVE-PROVED on this exact fixture and craft: arm
# at the APOAPSIS CROSSING, where the airspeed is near zero, DeploySafe is trivially
# SAFE, and Kerbin is already ~0.2 atm (well over the module's 0.04 atm gate). The
# canopy opens at ~11.9 km and the craft never reaches the terminal velocity that
# made an altitude trigger unopenable.
# ===================================================================================
[driver.missionParams]
throttle              = 1.0
apoapsisWindowMeters  = { min = 6000, max = 30000 }
# 30 m/s: arms at the apoapsis crossing. Measured DESCENT-entry rates on this craft
# were -7.4, -16.9, -26.1, -35.5 m/s (EVA-4 flight 1), so this arms within ~3 frames
# of the apex and is unreachable later in the fall.
chuteArmMaxRateMps    = 30
# 2500 m: pinned here rather than inherited from the fixture's PAW so the full-canopy
# leg is a declared mission input, and set to EVA-4's LIVE-PROVEN value on this exact
# craft rather than the fixture default of 1000.
#
# 1000 was this spec's first choice, on the reasoning that B1 has no EVA band to clear
# and a lower trigger keeps slow full-canopy descent out of the budget. EVA-4 flight 2
# MEASURED the numbers that make it a bad trade: the SEMI-deployed Jumping Flea does
# not crawl, it sinks at up to -236 m/s (peak at ~5.7 km, still -223 m/s at 2500 m),
# and the full canopy needs ~5.6 s to brake it to -23 m/s - about 680 m of altitude,
# on top of the ~8 s Mk16 full-deploy animation (parachuteMk1.cfg deploymentSpeed =
# 0.12). Triggering at 1000 m would spend two thirds of the remaining sky just
# decelerating and put touchdown inside the settle, which is exactly the regime where
# "did the craft survive?" stops being a question about Parsek. The saving was also
# illusory: at ~220 m/s the extra 1500 m of semi-deployed fall is ~7 s.
chuteFullDeployAltMeters = 2500
landedSituations      = ["LANDED", "SPLASHED"]
# ASCENT/COAST keep their live-proven values (measured 9.7 s and 40.8 s).
ascentTimeoutSeconds  = 90
coastTimeoutSeconds   = 180
# DESCENT: 360, DERIVED FROM EVA-4 FLIGHT-2 MEASUREMENTS on this same craft, not
# guessed. This spec first carried 600 on the assumption that a chuted descent would be
# several times longer than the ~56 s unchuted fall, sized to out-wait a pessimistic
# ~30 m/s semi-deployed crawl. That assumption was wrong by ~8x: the semi-deployed
# Jumping Flea sinks at up to -236 m/s, so the chute costs the descent far less time
# than expected.
#
# Measured build-up: EVA-4 timed apoapsis crossing -> 1,606 m (its handoff, already
# past its 2500 m full-deploy trigger and braked to -23.2 m/s) at 61.6 s. B1 continues
# to touchdown, which adds the slow full-canopy leg - ~1600 m at 23 m/s decaying toward
# a single-Mk16 terminal of ~7-9 m/s, so roughly 110-130 s. Total expected DESCENT is
# therefore ~180 s, and 360 is ~2x that.
#
# P1 - the one leg NOTHING has measured is that final full-canopy descent to the
# ground: EVA-4 always hands off in mid-air and never times its craft to touchdown. The
# 2x margin is sized for that unknown, not for the parts that are now measured. Trim
# from evidence once the first B1 run times it.
#
# Like EVA-4's, this budget is a BACKSTOP, not the real guard: a canopy that fails to
# open is caught first and fast by the craftCanopyObserved assertion plus the DOWN-
# ineligible ASSERT-FAIL, which name the inert chute instead of burning the budget.
descentTimeoutSeconds = 360

[dimensionsCovered]
D1  = ["auto-record-launch"]
D4  = ["atmospheric"]
# D7 chute-two-phase: CLAIMED 2026-07-25, on the CRAFT's own parachuteSingle, and
# only now that the canopy actually opens. It was never claimed before because the
# chute never opened; the required Part-event tokens below are what back the claim.
# EVA-4 covers the same cell on a KERBAL's ModuleEvaChute -- a different module and a
# different recording, so both are worth having.
D7  = ["chute-two-phase"]
D14 = ["kerbin"]

# A flown scenario PRODUCES a recording, so recordings are expected. count.min>=1
# keeps the REC-001/REC-003 log rules MANDATORY (M-A5 verifier 4): a dropped
# recording reds. The analyzer (Forbid) over the produced recording is the
# Parsek correctness gate.
#
# P3 - the max models touchdown BREAKUP debris. The 2026-07-19/20 crashes that set
# this window were ~300 m/s terminal-velocity impacts (one produced 4 breakup-child
# pids), NOT the canopy touchdowns this spec now flies, so the observed child count
# is expected to fall rather than rise. The window is deliberately left wide rather
# than re-pinned from a profile nobody has flown yet: redding on breakup-timing
# variance would be a false negative, and the analyzer over the produced recordings
# is the real Parsek correctness gate. Re-pin from the first live run.
[expectations.recordings]
count = { min = 1, max = 6 }

[expectations.logContracts]
# The two Part-event tokens are the PARSEK-SIDE proof of the canopy, and the reason
# this scenario can claim a chute surface at all: the mission's craftCanopyObserved
# assertion proves KSP opened the chute, and these prove PARSEK RECORDED it as the
# two-phase ParachuteSemiDeployed -> ParachuteDeployed pair. Emitted at Verbose from
# FlightRecorder.cs:1687 as `Part event: {eventType} '{partName}' pid={pid}`, hence
# the verboseLogging step above and the trailing-quote-less part-name prefix. Both
# tokens would have FAILED every B1 run flown before 2026-07-25.
required  = ["Recording started",
             "Part event: ParachuteSemiDeployed 'parachuteSingle",
             "Part event: ParachuteDeployed 'parachuteSingle",
             "Recording stopped"]
forbidden = ["\\[Parsek\\]\\[ERROR\\]"]

allowedAnomalies = []

[runtime]
# WALL clock. RAISED 2026-07-25 with the descent budget: 240 LoadGame + 780 mission
# + the fast SetSetting / CommitTree / FlushAndQuit verbs (seconds each) + 180 margin.
budgetSeconds = 1200

[retry]
policy = "once"

[expectedFail]
bugId = ""
