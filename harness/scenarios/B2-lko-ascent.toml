schema = 1
id = "B2-lko-ascent"
# nightly: the fixtures/saves/b2-lko-craft template is committed (operator
# 2026-07-19) and the mission is live-proven flyable (B2 PASS 2026-07-20,
# MISSION-OK, all verifiers green); flown missions are too long for daily.
tier = "nightly"
description = "LKO ascent: MechJeb AscentAutopilot to an 80 km near-circular orbit; assert orbit-parameter windows."
instanceProfile = "stock-minimal"
tags = ["B2", "S0.2", "flown", "mechjeb"]

[fixture]
# Pre-placed LKO-capable rocket on the pad. Fixture committed (operator
# 2026-07-19). The vessel is KSP's own stock "Kerbal X"
# (Ships/VAB/Kerbal X.craft, the canonical two-stage Mainsail orbiter).
# See the operator runbook's M-B1 section.
saveTemplate       = "fixtures/saves/b2-lko-craft"
injectedRecordings = "none"
craft              = []

[driver]
kind    = "autopilot"
mission = "b2_lko_ascent"

# `steps` MUST stay in the [driver] table, so it is declared ABOVE the
# [driver.missionParams] header (a key after the sub-table header would be scoped
# to driver.missionParams.steps and the spec would validate as having zero steps).
# Budget arithmetic (design invariant): missionBudget 780 >= 30 connect +
# (420+300) phases + margin; runtime 1200 >= 240 LoadGame + 780 mission + margin.
steps = [
  { cmd = "LoadGame",   args = { save = "${runSave}", name = "persistent" }, expect = "OK", budget = 240 },
  { cmd = "SetSetting", args = { name = "autoRecordOnLaunch", value = "true" }, expect = "OK" },
  { phase = "mission",  expect = "MISSION-OK", budget = 780 },
  { cmd = "CommitTree",                                          expect = "OK" },
  { cmd = "FlushAndQuit",                                        expect = "OK" },
]

# Tolerances tuned from actuals per plan section 10; validated against
# b2_lko_ascent.schema.toml.
[driver.missionParams]
targetApoapsisMeters      = 80000
targetPeriapsisMeters     = 80000
apoErrorMeters            = 5000
periErrorMeters           = 5000
eccentricityMax           = 0.02
inclinationErrorDeg       = 2.0
ascentTimeoutSeconds      = 420
circularizeTimeoutSeconds = 300

[dimensionsCovered]
D1  = ["auto-record-launch"]
D3  = ["orbital-checkpoint"]
D4  = ["atmospheric", "exo-propulsive"]
D14 = ["kerbin"]

[expectations.recordings]
# The flight commits ONE main ascent recording, but the Kerbal X drops six
# boosters on the way up and each becomes a parent-anchored debris child
# recording (first live B2 flight 2026-07-20: exactly 7 sidecars, analyzer
# RED=0 over all of them - Parsek modeling staging debris is CORRECT
# behavior the original {1,1} expectation failed to model). min stays 1
# (the main recording must exist even if debris admission varies); max is
# main + 6 boosters + 1 for the launch-escape tower (the live flight produced
# exactly 7 - the LES jettison did not record - but whether that is
# deterministic under MechJeb autostage is unestablished, so the window
# absorbs an 8th rather than redding on staging-timing variance; Fable
# review of the PR #1328 tail, WATCH-4).
count = { min = 1, max = 8 }

[expectations.logContracts]
required  = ["Recording started", "Recording stopped"]
forbidden = ["\\[Parsek\\]\\[ERROR\\]"]

allowedAnomalies = []

[runtime]
budgetSeconds = 1200

[retry]
policy = "once"

[expectedFail]
bugId = ""
