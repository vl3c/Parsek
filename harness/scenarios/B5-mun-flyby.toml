schema = 1
id = "B5-mun-flyby"
# nightly: fixture committed (shares b2-lko-craft with B2/B4) and the flyby is
# the longest flown mission yet (transfer coast + flyby, mostly under rails
# warp). LIVE-PROVEN 2026-07-22: PASS on attempt 1 after eight live-finding
# flights (ascent, TLI via the MechJeb executor, DIY native-AP correction
# burn, cross-SOI coast, flyby at 1,142 km, free-return into Kerbin SOI;
# wall 1015 s, all verifiers green).
tier = "nightly"
description = "Mun flyby / free-return: MechJeb ascent to LKO, ManeuverPlanner Hohmann transfer, autowarped TLI burn, course-correction, cross-SOI coast, Mun flyby, return into Kerbin SOI; assert orbit + target SOI reached + flyby floor + returned home."
instanceProfile = "stock-minimal"
tags = ["B5", "flown", "mechjeb", "mun", "cross-soi"]

[fixture]
# Same pre-placed Kerbal X fixture as B2/B4 (committed 2026-07-19): the ascent
# half is byte-for-byte the B2 mission path; only the post-ORBIT phases are new.
saveTemplate       = "fixtures/saves/b2-lko-craft"
injectedRecordings = "none"
craft              = []

[driver]
kind    = "autopilot"
mission = "b5_mun_flyby"

# `steps` MUST stay in the [driver] table, so it is declared ABOVE the
# [driver.missionParams] header (a key after the sub-table header would be
# scoped to driver.missionParams.steps and the spec would validate as having
# zero steps).
# Budget arithmetic (ESTIMATED, pending the first live flight): missionBudget
# 2400 (WALL) >= 30 connect + ascent ~250 + circularize ~100 + plan+TLI burn
# ~300 (autowarp compresses the node wait) + corrections ~2x150 + coast ~200
# (the ~2-day game-time transfer runs at a HELD 1000x via non-blocking
# set_rails_warp; warp changes only when an action is imminent) + flyby ~120
# at 100x + settle + margin. Phase budgets in missionParams are GAME time.
# runtime 2700 >= 240 LoadGame + 2400 mission + margin.
steps = [
  { cmd = "LoadGame",   args = { save = "${runSave}", name = "persistent" }, expect = "OK", budget = 240 },
  { cmd = "SetSetting", args = { name = "autoRecordOnLaunch", value = "true" }, expect = "OK" },
  { phase = "mission",  expect = "MISSION-OK", budget = 2400 },
  { cmd = "CommitTree",                                          expect = "OK" },
  { cmd = "FlushAndQuit",                                        expect = "OK" },
]

# Ascent half = B2's proven tolerances verbatim; transfer half all thresholds /
# budgets (validated against b5_mun_flyby.schema.toml), never a golden
# trajectory. Phase timeouts are GAME seconds (rails hops + NodeExecutor
# autowarp advance them fast).
[driver.missionParams]
targetApoapsisMeters       = 80000
targetPeriapsisMeters      = 80000
apoErrorMeters             = 5000
periErrorMeters            = 5000
ascentTimeoutSeconds       = 420
circularizeTimeoutSeconds  = 300
targetBodyName             = "Mun"
homeBodyName               = "Kerbin"
# The Mun orbits at ~12,000 km; a TLI that raised apoapsis past 10,000 km is
# unambiguous evidence the burn happened (floor, not a window).
transferMinApoapsisMeters  = 10000000
# Course-correct the flyby periapsis to 60 km: comfortably above the ~7 km Mun
# peaks + the 10 km assertion floor, low enough for a real gravity-assist
# flyby geometry.
courseCorrectPeriapsisMeters = 60000
# A genuine course correction is a small tweak; an over-cap plan is removed by
# the runner and the coast flies the raw Hohmann intercept (live flight 2).
# 150 not 100: flight 4's post-TLI quotes were 108-118 m/s and must fly.
maxCorrectionDvMps         = 150
# Two rounds: post-TLI (trigger 0) + a mid-coast refinement at 6,000 km -- the
# fourth flight proved executor residual drifts a corrected +60 km periapsis
# to -29 km (impact) over the long coast without the second round.
correctionTriggerAltsMeters = [0, 6000000]
planTimeoutSeconds         = 300
planRetrySeconds           = 30
transferBurnTimeoutSeconds = 4000
coastTimeoutSeconds        = 400000
flybyTimeoutSeconds        = 300000
coastWarpFactor            = 6
flybyWarpFactor            = 5
targetPeriapsisFloorMeters = 10000

# Coverage: the transfer coast + flyby are the cross-SOI recording cells -- D4
# cohesive-cross-body-coast (the ExoBallistic Kerbin->Mun->Kerbin coast kept
# cohesive by the optimizer), D3 orbital-checkpoint (on-rails checkpoints
# across the warp hops), D14 kerbin + mun + warp-rails. No dedicated flyby /
# free-return value exists in the registry; gap noted in the todo doc's B5
# section alongside B4's reentry gap.
[dimensionsCovered]
D1  = ["auto-record-launch"]
D3  = ["orbital-checkpoint"]
D4  = ["atmospheric", "exo-propulsive", "exo-ballistic", "cohesive-cross-body-coast"]
D14 = ["kerbin", "mun", "warp-rails"]

[expectations.recordings]
# Main ascent recording + up to 6 dropped Kerbal X boosters recorded as
# parent-anchored debris children + 1 LES-tower margin (same WATCH-4 rationale
# as B2/B4's max 8). B5 stages nothing after the ascent (the TLI + correction
# burns fly the orbiter stage), so no extra deorbited-stage sidecar. min stays
# 1: the main recording must exist even if debris admission varies.
count = { min = 1, max = 8 }

[expectations.logContracts]
required  = ["Recording started", "Recording stopped"]
forbidden = ["\\[Parsek\\]\\[ERROR\\]"]

allowedAnomalies = []

[runtime]
budgetSeconds = 2700

[retry]
policy = "once"

[expectedFail]
bugId = ""
