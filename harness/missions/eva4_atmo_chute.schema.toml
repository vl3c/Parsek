# Declared param schema for mission eva4_atmo_chute (scenario EVA-4-atmo-chute).
#
# hlib.validate_spec does NOT read this file itself: run.py parses every
# harness/missions/<mission>.schema.toml with tomllib into a registry
# { mission-name -> schema-dict } and INJECTS it as validate_spec's `mission_schemas`
# argument; hlib's pure _validate_mission_params then drives required-key presence and
# per-value type/range checks from the `params` table below. Shape consumed by hlib:
#   {"params": {"<name>": {"required": bool, "type": "<t>", "min": <num?>, "max": <num?>}}}
# where <t> in {float, int, number, window, list, string, bool}.
#
# Every value here is a WINDOW / tolerance / budget, never a golden trajectory. The
# craftChute* and eva* keys are the arming rule and the EVA envelope; the EVA4_* comment
# block in mlib.py carries the flight-1 / flight-2 measurements they were derived from.
#
# WHAT THIS SCHEMA CAN AND CANNOT ENFORCE. hlib's _validate_mission_params drives
# required-key presence plus per-value type/range checks from the tables below, one key at
# a time. It has NO cross-field vocabulary, so the ORDERING relations this scenario
# depends on -
#   evaWindowMinAltMeters < evaWindowMaxAltMeters < craftChuteFullDeployAltMeters
# - are a CONVENTION stated in the per-key comments, NOT a validated contract. Nothing
# rejects a spec that inverts them. They are still safe to state as intent because they
# are also load-bearing in the OTHER direction: the mlib window gate is fail-closed on
# every conjunct, so a mis-ordered pair does not produce a false handoff, it produces a
# window that never opens and a NAMED eva-window-missed ASSERT-FAIL carrying the observed
# altitude / rate / chute state. Read the comments as "why these values relate this way",
# not as "the schema guarantees it".

[params.throttle]
required = true
type = "float"
min = 0.0
max = 1.0

# Hop sanity only (same semantics as B1's): proves the SRB actually flew a suborbital
# hop rather than fizzling on the pad or over-shooting the regime the window was sized
# for. MEASURED flight 1: orbital apoapsis 19,879 m, peak altitude 11,965 m.
[params.apoapsisWindowMeters]
required = true
type = "window"

# ARM-WHILE-SLOW bound (m/s). The machine arms the CRAFT's parachutes on the first
# DESCENT frame whose |vertical speed| is within this bound - i.e. at the apoapsis
# crossing - and NOT at an altitude on the way down.
#
# FLIGHT-1 EVIDENCE (2026-07-24): arming at 2500 m produced an INERT chute. Measured, the
# craft was at -301 m/s there, and 5.1 s later at 855 m the rate had moved only 4.7 m/s;
# the Parsek recording carries ZERO Parachute* part events. Stock's ACTIVE ->
# SEMIDEPLOYED gate needs `automateSafeDeploy >= (int)deploymentSafeState`, and the
# fixture's parachuteSingle persists `automateSafeDeploy = 0` (deploy only while SAFE),
# which DeploySafe never reads at ~300 m/s in dense air. A craft at terminal velocity
# never slows on its own, so the armed chute waits forever - the arm was INERT, not late.
# Measured DESCENT-entry rates were -7.4, -16.9, -26.1, -35.5 m/s, so 30 arms within
# ~3 frames of apoapsis, where DeploySafe is trivially SAFE and Kerbin is already ~0.2
# atm (far over the module's 0.04 atm semi-deploy pressure gate).
[params.craftChuteArmMaxRateMps]
required = true
type = "number"
min = 1.0
max = 120.0

# The stock full-deploy altitude (m) the machine SETS on the craft's parachutes at the
# same moment it arms them (kRPC Parachute.DeployAltitude - a stock PAW tweakable, so
# this is player-normal). The fixture persists 1000 m; the Mk16's full-deploy animation
# is SLOW (parachuteMk1.cfg deploymentSpeed = 0.12, so ~8 s), so leaving it at 1000 m
# would force the EVA band under 1000 m with an unmeasured settle distance eating into
# it. Raising it puts the craft at its FULL-canopy terminal rate well above the band,
# and gives the KERBAL a longer atmospheric descent - the surface this scenario exists
# to exercise.
[params.craftChuteFullDeployAltMeters]
required = true
type = "number"
min = 500.0
max = 10000.0

# EVA-window ceiling: the highest altitude the mission will hand off at. By CONVENTION
# (not schema-enforced - see the header note) it sits BELOW craftChuteFullDeployAltMeters
# so the "chute reads Deployed" conjunct can only become true inside or above the band,
# never above it by accident.
[params.evaWindowMaxAltMeters]
required = true
type = "number"
min = 200.0
max = 5000.0

# EVA-window floor: sink below this without the window ever opening and the mission
# ASSERT-FAILs with eva-window-missed (the reason names the OBSERVED chute state, so a
# repeat of the flight-1 inert-armed-chute failure reads "craftChute=Armed"). By
# CONVENTION (not schema-enforced) it sits below evaWindowMaxAltMeters. The gap between
# floor and ceiling is the settle room the craft's ~8 s full-deploy animation gets, plus
# the one extra frame the EVA4_WINDOW_DEBOUNCE_K agreement run costs (~10-20 m at the
# measured handoff rate); the floor is also the minimum sky the KERBAL needs (its own
# chute fully deploys under 1000 m at ~5-6 m/s and is only semi-deployed above that).
[params.evaWindowMinAltMeters]
required = true
type = "number"
min = 100.0
max = 5000.0

# |vertical speed| bound at the handoff frame: the safety bound the kerbal leaves the
# hatch into, and a cross-check that the OBSERVED canopy is actually doing work. Sized
# against the B1-measured ~9 m/s Jumping Flea touchdown rate under full canopy - low
# enough that a merely semi-deployed craft can never satisfy it, so the window stays
# meaningful rather than rubber-stamping any slow-ish frame.
[params.evaMaxDescentRateMps]
required = true
type = "number"
min = 1.0
max = 120.0

[params.ascentTimeoutSeconds]
required = true
type = "number"
min = 0.0

[params.coastTimeoutSeconds]
required = true
type = "number"
min = 0.0

# DESCENT spans the apoapsis crossing -> the EVA window, flown almost entirely UNDER
# CANOPY since the flight-1 fix. MEASURED flight 2: 61.6 s (ut 60.9 -> 122.5); the
# semi-deployed craft sinks at up to -236 m/s rather than crawling, and the full canopy
# brakes it from -223 to -23 m/s in ~5.6 s below the 2500 m trigger. The shipped 240 s is
# ~3.9x that. It is a BACKSTOP: a misbehaving canopy is caught first, and by name, by the
# eva-window-missed ASSERT-FAIL at the window floor.
[params.descentTimeoutSeconds]
required = true
type = "number"
min = 0.0

# Optional: consecutive AIRBORNE frozen-telemetry samples (bit-identical orbit fields
# while UT advances) before the mission declares the vessel lost. mlib.Eva4Params
# defaults it to 10 when absent.
[params.frozenTelemetrySamples]
required = false
type = "int"
min = 2
max = 1000

# Optional: the situations that keep the EVA window legitimate. Defaults to
# ["FLYING", "SUB_ORBITAL"]. A craft that has already LANDED is the EVA-1 ground case,
# not this scenario's mid-flight surface.
[params.airborneSituations]
required = false
type = "list"
