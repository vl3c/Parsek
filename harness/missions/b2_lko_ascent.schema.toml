# Declared param schema for mission b2_lko_ascent (design M-B1
# "Scenario spec [driver] extension" + "Mission B2: LKO-ascent").
#
# hlib.validate_spec does NOT read this file itself: run.py (shell / I/O) parses
# every harness/missions/<mission>.schema.toml with tomllib into a registry
# { mission-name -> schema-dict } and INJECTS it as validate_spec's
# `mission_schemas` argument. hlib's PURE validator (_validate_mission_params)
# then drives required-key presence and per-value type/range checks from the
# `params` table below. Shape consumed by hlib:
#   {"params": {"<name>": {"required": bool, "type": "<t>", "min": <num?>, "max": <num?>}}}
# Every value here is a tolerance / budget, never a golden orbit (design
# "Determinism guardrails" + "Mission B2").

[params.targetApoapsisMeters]
required = true
type = "number"
min = 0.0

[params.targetPeriapsisMeters]
required = true
type = "number"
min = 0.0

[params.apoErrorMeters]
required = true
type = "number"
min = 0.0

[params.periErrorMeters]
required = true
type = "number"
min = 0.0

[params.eccentricityMax]
required = true
type = "float"
min = 0.0
max = 1.0

[params.inclinationErrorDeg]
required = true
type = "number"
min = 0.0

[params.ascentTimeoutSeconds]
required = true
type = "number"
min = 0.0

[params.circularizeTimeoutSeconds]
required = true
type = "number"
min = 0.0

# Optional: the launch-site latitude the inclination assertion targets. Omitted
# from the design's missionParams example (a due-east KSC launch targets ~0 deg);
# mlib.B2Params defaults it to 0.0 when absent.
[params.launchSiteLatitude]
required = false
type = "float"
min = -90.0
max = 90.0
