# Declared param schema for mission b1_pad_hop (design M-B1
# "Scenario spec [driver] extension" + "Mission B1: pad-hop").
#
# hlib.validate_spec does NOT read this file itself: run.py (shell / I/O) parses
# every harness/missions/<mission>.schema.toml with tomllib into a registry
# { mission-name -> schema-dict } and INJECTS it as validate_spec's
# `mission_schemas` argument. hlib's PURE validator (_validate_mission_params)
# then drives required-key presence and per-value type/range checks from the
# `params` table below. Shape consumed by hlib:
#   {"params": {"<name>": {"required": bool, "type": "<t>", "min": <num?>, "max": <num?>}}}
# where <t> in {float, int, number, window, list, string, bool}. A `window` value
# in the spec is a table {min, max}; hlib additionally enforces min <= max
# structurally. Every value here is a WINDOW / tolerance / budget, never a golden
# trajectory (design "Determinism guardrails").

[params.throttle]
required = true
type = "float"
min = 0.0
max = 1.0

[params.apoapsisWindowMeters]
required = true
type = "window"

# ARM-WHILE-SLOW bound (2026-07-25). The machine arms the chute on the first DESCENT
# frame whose |vertical speed| is within this, i.e. at the APOAPSIS CROSSING -- NOT at
# an altitude. The old chuteDeployAltMeters altitude trigger was inert on this fixture:
# stock's ACTIVE -> SEMIDEPLOYED needs automateSafeDeploy >= deploymentSafeState, the
# fixture persists automateSafeDeploy = 0 (SAFE only), and a craft at terminal velocity
# in dense air never reads SAFE and never slows on its own. Bounded well under a
# free-fall second (Kerbin adds ~10 m/s per ~1 s poll) so it can only ever be satisfied
# near the apex.
[params.chuteArmMaxRateMps]
required = true
type = "number"
min = 1.0
max = 100.0

# The stock deployAltitude the machine writes onto every parachute in the same frame it
# arms. Declared here rather than inherited from the fixture's persisted PAW value so
# the full-canopy leg is a mission input, not a silent fixture property.
[params.chuteFullDeployAltMeters]
required = true
type = "number"
min = 0.0

[params.landedSituations]
required = true
type = "list"

[params.ascentTimeoutSeconds]
required = true
type = "number"
min = 0.0

[params.coastTimeoutSeconds]
required = true
type = "number"
min = 0.0

[params.descentTimeoutSeconds]
required = true
type = "number"
min = 0.0

# Optional: consecutive AIRBORNE frozen-telemetry samples (bit-identical orbit
# fields while UT advances) before the mission declares the vessel lost/destroyed
# and terminates (design "vessel-destroyed terminal"). mlib.B1Params defaults it to
# 10 when absent.
[params.frozenTelemetrySamples]
required = false
type = "int"
min = 2
max = 1000

# DOWN eligibility: the last finite altitude must be at/below this for a
# post-chute vessel loss to count as the DOWN success terminal (option A:
# "reached the ground"). A loss at altitude stays an ASSERT-FAIL.
[params.downMaxAltMeters]
required = false
type = "number"
min = 10.0
max = 5000.0
